version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grabit-app
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'php-fpm-healthcheck || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - grabit

  nginx:
    image: nginx:1.25-alpine
    container_name: grabit-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./storage/app/public:/var/www/html/storage/app/public:ro
      - ./public:/var/www/html/public:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - grabit

  mysql:
    image: mysql:8.0
    container_name: grabit-mysql
    restart: always
    environment:
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - grabit

  redis:
    image: redis:7-alpine
    container_name: grabit-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - grabit

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: grabit-meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: '${MEILISEARCH_KEY}'
      MEILI_ENV: production
    volumes:
      - meilisearch-data:/meili_data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - grabit

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grabit-queue
    restart: always
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --queue=high,default,low,notifications
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - grabit

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grabit-scheduler
    restart: always
    command: >
      sh -c "while true; do php /var/www/html/artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - grabit

volumes:
  mysql-data:
  redis-data:
  meilisearch-data:

networks:
  grabit:
    driver: bridge
